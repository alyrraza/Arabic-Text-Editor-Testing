name: Arabic Editor JUnit Tests

# kab run karna hai
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # GitHub ka free Linux server use karo
    runs-on: ubuntu-latest

    steps:
      # Step 1 — code download karo server pe
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2 — Java 11 install karo
      # kyunki hamare paas Java 11 hai locally bhi
      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # Step 3 — Maven dependencies cache karo
      # Cache matlab: pehli baar download karo, phir save rakho
      # Jaise grocery store — pehli baar jaake laao, phir ghar mein rakho
      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # Step 4 — tests run karo
      - name: Run All JUnit Tests
        run: mvn test

      # Step 5 — test results save karo
      # chahe pass ho ya fail — results hamesha upload karo
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/